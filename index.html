<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abijou구로점 근무일정표</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#f0f2f8;--sur:#fff;--sur2:#f5f7fc;--bdr:#dde2f0;--bdr2:#c8cfe4;
  --acc:#3b6ef5;--acc2:#6c47f0;--accl:#e8edff;
  --tx:#1a1f3a;--txd:#5a6385;--txm:#9ba3c0;
  --sh:0 2px 12px rgba(60,80,180,.08);--shlg:0 8px 32px rgba(60,80,180,.14);
  --off:#dbeafe;--offt:#1d4ed8;--ann:#dcfce7;--annt:#166534;
  --ham:#fef9c3;--hamt:#854d0e;--hpm:#ffedd5;--hpmt:#9a3412;
  --con:#e0f2fe;--cont:#0369a1;--sub:#f3e8ff;--subt:#7e22ce;
  --res:#fee2e2;--rest:#991b1b;--unp:#fde68a;--unpt:#78350f;
  --new:#d1fae5;--newt:#065f46;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* ── LOGIN ── */
#ls{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#e8edff,#f0f2f8 60%,#ede8ff);z-index:100}
.lb{background:var(--sur);border:1px solid var(--bdr);border-radius:20px;
    padding:44px 40px;width:380px;box-shadow:var(--shlg)}
.lb h1{font-size:22px;font-weight:700;margin-bottom:4px;
       background:linear-gradient(135deg,var(--acc),var(--acc2));
       -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lb .sub{font-size:13px;color:var(--txd);margin-bottom:28px}
.lb label{font-size:12px;color:var(--txd);display:block;margin-bottom:6px;font-weight:500}
.lb input{width:100%;padding:11px 14px;background:var(--sur2);border:1.5px solid var(--bdr);
          border-radius:10px;color:var(--tx);font-size:14px;margin-bottom:16px;outline:none;
          font-family:'DM Mono',monospace;transition:border .2s}
.lb input:focus{border-color:var(--acc);background:#fff}
.lbtn{width:100%;padding:13px;background:linear-gradient(135deg,var(--acc),var(--acc2));
      border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;
      font-family:'Noto Sans KR',sans-serif}
.lbtn:hover{opacity:.9}
.lerr{font-size:12px;color:#dc2626;margin-top:8px;text-align:center;min-height:18px}
.lhint{font-size:11.5px;color:var(--txm);margin-top:16px;line-height:1.9;
       background:var(--sur2);padding:10px 14px;border-radius:10px;border:1px solid var(--bdr)}
.lhint b{color:var(--txd)}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;padding:0 24px;
       height:52px;background:var(--sur);border-bottom:1px solid var(--bdr);
       position:sticky;top:0;z-index:60;box-shadow:var(--sh)}
.hl{display:flex;align-items:center;gap:12px}
.brand{font-size:16px;font-weight:700;color:var(--tx)}
.brand span{background:linear-gradient(135deg,var(--acc),var(--acc2));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.rbadge{font-size:11px;padding:3px 11px;border-radius:20px;font-weight:600;
        font-family:'DM Mono',monospace}
.ra{background:var(--accl);color:var(--acc);border:1.5px solid #b8caff}
.rv{background:#f3e8ff;color:var(--acc2);border:1.5px solid #d8b8ff}
/* nav-group removed */
.lout{padding:7px 14px;font-size:12px;background:transparent;border:1.5px solid var(--bdr);
      border-radius:8px;color:var(--txd);cursor:pointer;font-family:'Noto Sans KR',sans-serif;
      transition:all .15s}
.lout:hover{border-color:var(--acc);color:var(--acc);background:var(--accl)}

/* ── LEGEND ── */
.legbar{display:flex;flex-wrap:wrap;gap:8px;padding:8px 24px;
        background:var(--sur);border-bottom:1px solid var(--bdr);align-items:center;min-height:36px;
        position:sticky;top:52px;z-index:55}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--txd)}
.chip{display:inline-block;padding:2px 5px;border-radius:4px;font-size:10px;font-weight:700;
      line-height:1.5;font-family:'DM Mono',monospace}
.co{background:var(--off);color:var(--offt)} .ca{background:var(--ann);color:var(--annt)}
.cha{background:var(--ham);color:var(--hamt)} .chp{background:var(--hpm);color:var(--hpmt)}
.cc{background:var(--con);color:var(--cont)}  .cs{background:var(--sub);color:var(--subt)}
.cr{background:var(--res);color:var(--rest)}  .cu{background:var(--unp);color:var(--unpt)}
.cn{background:var(--new);color:var(--newt)}
.d-won{background:#ede9fe;color:#5b21b6} .d-con{background:#dbeafe;color:#1e40af}
.d-cod{background:#d1fae5;color:#065f46} .d-nur{background:#fce7f3;color:#9d174d}
.d-ski{background:#fef9c3;color:#78350f}
.leg-sep{width:1px;background:var(--bdr);align-self:stretch;margin:0 2px}

/* ── TABLE ── */
/* header 52px + legend 36px = 88px 이미 fixed, thead rows sticky 그 아래 */
.tw{overflow-x:clip;padding:16px 24px 48px}
table{border-collapse:separate;border-spacing:0;font-size:12px;white-space:nowrap;min-width:100%}

/* Fixed left columns: c0~c6
   c0(No)  left:0,   w:36
   c1(이름)  left:36,  w:82
   c2(입사일) left:118, w:76
   c3(부서)  left:194, w:64
   c4(직급)  left:258, w:60
   c5(비고)  left:318, w:84
   c6(관리)  left:402, w:60  → viewer에선 없음
*/
.fx{position:sticky!important;z-index:20!important;background:var(--sur)!important}
.c0{left:0;min-width:36px;max-width:36px}
.c1{left:36px;min-width:82px}
.c2{left:118px;min-width:76px;max-width:76px}
.c3{left:194px;min-width:64px}
.c4{left:258px;min-width:60px}
.c5{left:318px;min-width:84px;max-width:84px}
.c6{left:402px;min-width:58px;max-width:58px}

td{padding:6px 3px;text-align:center;border-bottom:1px solid var(--bdr);color:var(--txd)}
td.c0,td.c1,td.c2,td.c3,td.c4,td.c5,td.c6{
  position:sticky;background:var(--sur);border-right:1.5px solid var(--bdr);z-index:5}
td.c0{left:0}
td.c1{left:36px;color:var(--tx);font-weight:600;font-size:13px}
td.c2{left:118px;font-size:10.5px;color:var(--txd);font-family:'DM Mono',monospace}
td.c3{left:194px;font-size:11px}
td.c4{left:258px;font-size:11px}
td.c5{left:318px;font-size:10px;color:var(--txm)}
td.c6{left:402px}

tbody tr:hover td{background:var(--sur2)!important}
tbody tr.new-row td{background:#f0fdf4!important}
tbody tr.new-row td.c0,tbody tr.new-row td.c1,tbody tr.new-row td.c2,
tbody tr.new-row td.c3,tbody tr.new-row td.c4,tbody tr.new-row td.c5,
tbody tr.new-row td.c6{background:#f0fdf4!important}
tbody tr.new-row:hover td{background:#dcfce7!important}

/* thead sticky top은 JS가 동적으로 계산해 적용 (updateStickyTops) */
.thead-m th{background:var(--sur);position:sticky;z-index:10;
            padding:5px 3px;font-size:11.5px;font-weight:700;color:var(--txd);
            border-bottom:none}
.thead-d th{background:var(--sur);position:sticky;z-index:10;
            padding:5px 3px;font-size:12px;font-weight:600;color:var(--txd);
            border-bottom:none}
.thead-w th{background:var(--sur);position:sticky;z-index:10;
            padding:3px 3px;font-size:10.5px;font-weight:500;color:var(--txm);
            border-bottom:2px solid var(--bdr)}
.thead-m .fx,.thead-d .fx,.thead-w .fx{z-index:25!important}

.dc{min-width:38px;max-width:38px;cursor:pointer;user-select:none;transition:background .1s}
.dc:hover{background:var(--accl)!important}
.dc.wk{background:rgba(100,116,180,.05)}
.dc.tod{box-shadow:inset 0 0 0 2px var(--acc)}
.dc.ro{cursor:default}.dc.ro:hover{background:inherit!important}
th.dc:hover{background:var(--sur)!important}
th.sun{color:#dc2626!important} th.sat{color:#1d4ed8!important}
.msep{border-left:2.5px solid var(--acc)!important}

/* tfoot */
tfoot tr td{background:var(--sur2)!important;border-top:2px solid var(--bdr2);
            font-size:11px;font-weight:700}
tfoot tr td.c0,tfoot tr td.c1,tfoot tr td.c2,tfoot tr td.c3,
tfoot tr td.c4,tfoot tr td.c5,tfoot tr td.c6{
  position:sticky;background:var(--sur2)!important;z-index:5}

/* action buttons */
.act-wrap{display:flex;align-items:center;justify-content:center;gap:2px}
.ibtn{background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:5px;
      font-size:13px;line-height:1;color:var(--txm);transition:all .15s}
.ibtn-e:hover{color:var(--acc);background:var(--accl)}
.ibtn-d:hover{color:#dc2626;background:#fee2e2}
/* ── 하단 네비게이션 바 ── */
.bottom-nav{
  display:none; /* JS에서 로그인 후 표시 */
  align-items:center;justify-content:center;gap:6px;
  padding:10px 24px;
  background:var(--sur);border-top:1px solid var(--bdr);
  position:sticky;bottom:0;z-index:40;
  box-shadow:0 -2px 12px rgba(60,80,180,.06);
}
.nav-btn{
  display:flex;align-items:center;justify-content:center;
  height:32px;padding:0 14px;
  background:var(--sur2);border:1.5px solid var(--bdr);border-radius:8px;
  color:var(--txd);cursor:pointer;font-size:13px;font-weight:700;
  font-family:'DM Mono',monospace;transition:all .15s;user-select:none;
  letter-spacing:-.5px;
}
.nav-btn:hover{background:var(--accl);border-color:var(--acc);color:var(--acc)}
.nav-btn:active{transform:scale(.95)}
/* nav-sep, nav-label removed */
.addbtn{margin:10px 24px;padding:9px 18px;background:var(--sur);
        border:1.5px dashed var(--bdr2);border-radius:10px;color:var(--txd);
        cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.addbtn:hover{border-color:var(--acc);color:var(--acc);background:var(--accl)}


/* ── 오늘 팀별 출근 현황 ── */
function updateTodayStats(){
  const el=document.getElementById('today-stats');
  if(!el||!role) return;
  const t=new Date();
  const key=dk(t.getFullYear(),t.getMonth(),t.getDate());
  const c=attendCounts(key);
  // 총 출근
  const total=Object.values(c).reduce((a,b)=>a+b,0);
  const totalStr=Number.isInteger(total)?String(total):total.toFixed(1);
  const deptColors={won:'d-won',con:'d-con',cod:'d-cod',nur:'d-nur',ski:'d-ski'};
  const today=`${t.getMonth()+1}/${t.getDate()}`;
  let html=`<span style="font-size:11px;color:var(--txd);font-weight:600">${today} 출근</span>`;
  html+=`<span style="font-size:12px;font-weight:700;color:var(--acc);background:var(--accl);padding:2px 9px;border-radius:10px">전체 ${total}명</span>`;
  DEPTS.forEach(dep=>{
    const n=c[dep.key];
    const nStr2=Number.isInteger(n)?String(n):n.toFixed(1);
    html+=`<span style="display:flex;align-items:center;gap:3px;font-size:11px">
      <span class="chip ${dep.cls}" style="padding:2px 5px">${dep.short}</span>
      <span style="font-weight:700;color:var(--tx)">${nStr2}</span>
    </span>`;
  });
  el.innerHTML=html;
}
/* ── STICKY TOP 동적 계산 ── */
function updateStickyTops(){
  // header의 실제 높이로 legbar sticky top 동적 적용
  const hdrH = document.querySelector('header').offsetHeight;
  document.querySelector('.legbar').style.top = hdrH + 'px';

  // header + legbar 합산 높이
  const legH = document.querySelector('.legbar').offsetHeight;
  const base = hdrH + legH;

  // thead 3개 행에 순차적으로 top 적용
  const rows = document.querySelectorAll('#th tr');
  let t = base;
  rows.forEach(row => {
    row.querySelectorAll('th').forEach(th => { th.style.top = t + 'px'; });
    t += row.offsetHeight || 26;
  });

  // tbody의 각 행이 스크롤 앵커될 때 헤더에 가리지 않도록 scroll-margin-top 설정
  const totalFixed = t; // base + 3 thead rows 합계
  document.querySelectorAll('#tb tr, #tf tr').forEach(tr => {
    tr.style.scrollMarginTop = totalFixed + 'px';
  });

  // .tw 컨테이너에 padding-top 으로 첫 행 가림 방지 (초기 로드 시)
  document.querySelector('.tw').style.paddingTop = '16px';
}

/* ── HOVER POPUP ── */
#pop{position:fixed;z-index:500;background:var(--sur);border:1px solid var(--bdr2);
     border-radius:14px;padding:13px 15px;box-shadow:var(--shlg);
     min-width:210px;max-width:250px;pointer-events:none;
     opacity:0;transform:translateY(6px);transition:opacity .15s,transform .15s}
#pop.show{opacity:1;transform:translateY(0)}
.pt{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:9px;
    display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ptot{font-size:11px;font-weight:600;background:var(--accl);color:var(--acc);
      padding:2px 8px;border-radius:10px}
.prow{display:flex;align-items:center;gap:7px;padding:3px 0;
      border-bottom:1px solid var(--bdr)}
.prow:last-child{border-bottom:none}
.pname{font-size:11.5px;font-weight:600;padding:2px 7px;border-radius:5px;flex-shrink:0;min-width:32px}
.pbar-w{flex:1;height:6px;background:var(--bdr);border-radius:3px;overflow:hidden}

.pcnt{font-size:12px;font-weight:700;color:var(--tx);min-width:24px;text-align:right;flex-shrink:0}

/* ── MODALS ── */

.ov.op{display:flex}

.msub{font-size:12px;color:var(--txd);margin-bottom:18px}

.sm-w{width:340px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sb{padding:10px 8px;border-radius:9px;border:1.5px solid transparent;cursor:pointer;

.clr{width:100%;padding:9px;background:var(--sur2);border:1.5px solid var(--bdr);

.frow input,.frow select{

.frow input:focus,.frow select:focus{border-color:var(--acc);background:#fff}
.frow select option{background:var(--sur)}

.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.ferr{font-size:12px;color:#dc2626;min-height:16px;margin-bottom:10px}
.jsec{background:var(--new);border:1.5px solid #6ee7b7;border-radius:10px;

.jsec label{font-size:11.5px;font-weight:700;color:var(--newt);display:block;margin-bottom:6px}
.jsec input,.jsec select{background:#fff;border-color:#6ee7b7}
/* delete modal */
.dm-w{width:340px}
.di{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:10px;
    padding:13px 15px;margin-bottom:18px;font-size:13px;line-height:1.8;color:var(--txd)}

/* shared buttons */

.btn-d{width:100%;padding:11px;background:#fef2f2;border:1.5px solid #fca5a5;

  // Fallback: localStorage
  try{
    const se=localStorage.getItem('abijou_emps_v3');
    const ss=localStorage.getItem('abijou_sched_v3');
    emps  = se ? JSON.parse(se) : JSON.parse(JSON.stringify(DEFAULT_EMPS));
    sched = ss ? JSON.parse(ss) : JSON.parse(JSON.stringify(SEED_SCHED));
  }catch(_){
    emps  = JSON.parse(JSON.stringify(DEFAULT_EMPS));
    sched = JSON.parse(JSON.stringify(SEED_SCHED));
  }
  hideLoading();
}

async function saveData(){
  // localStorage 항상 저장 (오프라인 백업)
  try{
    localStorage.setItem('abijou_emps_v3', JSON.stringify(emps));
    localStorage.setItem('abijou_sched_v3', JSON.stringify(sched));
  }catch(_){}
  // Firestore 저장
  if(db && !FIREBASE_CONFIG.apiKey.includes('여기에')){
    try{
      await Promise.all([
        db.collection('abijou').doc(DOC_EMPS).set({list: emps}),
        db.collection('abijou').doc(DOC_SCHED).set({data: sched}),
      ]);
    }catch(e){
      console.warn('Firestore 쓰기 실패:', e);
    }
  }
}

/* ── HELPERS ── */
function dk(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function beforeJoin(e,k){return e.joinDate?k<e.joinDate:false;}
function isActive(e,k){
  if(beforeJoin(e,k))return false;
  if(e.retireDate&&k>e.retireDate)return false;
  return true;
}
function isParental(e){
  return (e.note||'').includes('육아휴직');
}
function isNewMonth(e,y,m){
  if(!e.joinDate)return false;
  return +e.joinDate.slice(0,4)===y && +e.joinDate.slice(5,7)-1===m;
}

function buildDates(){
  const list=[];
  // anchorDate 기준으로 정확히 MONTHS개월치 날짜 생성
  // 시작: anchorDate 당일, 끝: anchorDate + MONTHS개월 후 같은 날 -1일
  const startD=new Date(anchorDate.getFullYear(),anchorDate.getMonth(),anchorDate.getDate());
  const endD=new Date(anchorDate.getFullYear(),anchorDate.getMonth()+MONTHS,anchorDate.getDate()-1);
  let cur=new Date(startD);
  while(cur<=endD){
    const y=cur.getFullYear(),m=cur.getMonth(),d=cur.getDate();
    const dow=cur.getDay();
    // first: 해당 달의 1일이거나, 뷰의 첫 날
    const first=(d===1)||(cur.getTime()===startD.getTime()&&d!==1);
    list.push({y,m,d,dow,key:dk(y,m,d),first:(d===1)});
    cur.setDate(cur.getDate()+1);
  }
  return list;
}

function absentScore(e,key){
  // 1=전일 비근무, 0.5=반차, 0=근무
  if(isParental(e)) return 1;
  const st=sched[e.id]&&sched[e.id][key];
  if(!st) return 0;
  if(st==='ham'||st==='hpm') return 0.5;
  return 1;
}
function attendCounts(key){
  const c={};
  DEPTS.forEach(dep=>{
    const total=emps.filter(e=>dep.depts.includes(e.dept)&&isActive(e,key)).length;
    const absentSum=emps.filter(e=>dep.depts.includes(e.dept)&&isActive(e,key))
      .reduce((s,e)=>s+absentScore(e,key),0);
    c[dep.key]=Math.max(0,total-absentSum);
  });
  return c;
}

    const visMonths=new Set(dates.map(({y,m})=>`${y}-${m}`));

    return `<td style="color:${n>0?'var(--acc)':'var(--txm)'}${sp}">${n>0?nStr:''}</td>`;
  }).join('');

  document.getElementById('tf').innerHTML=`<tr>${ftFix}${wCells}</tr>`;
  attachHover();
  updateStickyTops();
  updateTodayStats();
}

/* ── HOVER POPUP 함수 ── */
const pop = document.getElementById('pop');
let popT = null;

function attachHover(){
  document.querySelectorAll('thead th.dc[data-key]').forEach(th => {
    th.addEventListener('mouseenter', e => showPop(e.currentTarget));
    th.addEventListener('mouseleave', hidePop);
  });
}

function showPop(th){
  clearTimeout(popT);
  const key = th.getAttribute('data-key');
  if(!key) return;
  const [y,m,d] = key.split('-').map(Number);
  const dow = new Date(y, m-1, d).getDay();
  const c = attendCounts(key);
  const tot = Object.values(c).reduce((a,b) => a+b, 0);
  const mx  = Math.max(...Object.values(c), 1);

  let html = `<div class="pt">${m}/${d} (${DW[dow]}) <span class="ptot">출근 ${tot}명</span></div>`;
  DEPTS.forEach(dep => {
    const n = c[dep.key];
    const pct = Math.round(n / mx * 100);
    html += `<div class="prow">
      <span class="pname ${dep.cls}">${dep.short}</span>
      <div class="pbar-w"><div class="pbar" style="width:${pct}%;background:${dep.bar}"></div></div>
      <span class="pcnt">${n}명</span>
    </div>`;
  });

  pop.innerHTML = html;

  // 팝업 위치: 날짜 th 바로 아래
  const r = th.getBoundingClientRect();
  const pw = 230;
  let left = r.left + r.width / 2 - pw / 2;
  if(left < 8) left = 8;
  if(left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
  pop.style.left  = left + 'px';
  pop.style.top   = (r.bottom + 6) + 'px';
  pop.style.width = pw + 'px';
  pop.classList.add('show');
}

function hidePop(){
  popT = setTimeout(() => pop.classList.remove('show'), 80);
}

  // 현재 관리자 비밀번호 확인
  const confirmHash = await sha256(adminConfirm);
  if(confirmHash !== PW_HASH.admin){
    errEl.textContent='현재 관리자 비밀번호가 올바르지 않습니다.'; return;
  }
  if(!adminNew && !viewerNew){
    errEl.textContent='변경할 비밀번호를 하나 이상 입력하세요.'; return;
  }

  const newHashes={...PW_HASH};
  if(adminNew)  newHashes.admin  = await sha256(adminNew);
  if(viewerNew) newHashes.viewer = await sha256(viewerNew);

  // DB에 저장
  if(db && !FIREBASE_CONFIG.apiKey.includes('여기에')){
    try{
      await db.collection('abijou').doc(DOC_PW).set(newHashes);
      PW_HASH=newHashes;
      errEl.style.color='var(--acc)';
      errEl.textContent='✓ 저장됐습니다.';
      setTimeout(closePwModal, 1200);
    }catch(e){
      errEl.textContent='저장 실패: '+e.message;
    }
  } else {
    // Firebase 미연결 시 메모리에만 적용
    PW_HASH=newHashes;
    errEl.style.color='var(--acc)';
    errEl.textContent='✓ 저장됐습니다. (Firebase 미연결 — 새로고침 후 초기화)';
    setTimeout(closePwModal, 1800);
  }
}

/* ── INIT ── */
// 앱 초기화 (Firebase 연결 후 데이터 로드)
(async function init(){
  initFirebase();
  await loadData();
  sortEmps();
})();
</script>
